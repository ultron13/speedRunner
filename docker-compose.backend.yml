# Docker Compose override for Go backend development
# Usage: docker-compose -f docker-compose.yml -f docker-compose.backend.yml up
services:
  # Go Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: speedrunner-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgresql://speedrunner:speedrunner_secret@postgres:5432/speedrunner
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=speedrunner-dev-secret
      - K8S_IN_CLUSTER=false
      - K8S_EXECUTION_NS=marathonrunner-execution
      - K8S_SYSTEM_NS=marathonrunner-system
      - NODE_ENV=development
      - LOG_LEVEL=debug
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - speedrunner-network
