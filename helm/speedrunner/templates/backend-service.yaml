apiVersion: v1
kind: Service
metadata:
  name: {{ include "speedrunner.fullname" . }}-backend
  labels:
    {{- include "speedrunner.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "speedrunner.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
