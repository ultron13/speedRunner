apiVersion: v1
kind: Secret
metadata:
  name: {{ include "speedrunner.fullname" . }}-secrets
  labels:
    {{- include "speedrunner.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ printf "postgresql://%s:%s@%s-postgres:5432/%s" (.Values.postgres.user | default "speedrunner") (.Values.postgres.password | default "speedrunner_secret") (include "speedrunner.fullname" .) (.Values.postgres.database | default "speedrunner") | quote }}
  redis-url: {{ printf "redis://%s-redis:6379" (include "speedrunner.fullname" .) | quote }}
  jwt-secret: {{ "speedrunner-dev-secret-change-in-production" | quote }}
