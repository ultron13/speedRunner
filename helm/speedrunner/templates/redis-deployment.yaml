{{- if .Values.redisStandalone.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "speedrunner.fullname" . }}-redis
  labels:
    {{- include "speedrunner.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "speedrunner.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        {{- include "speedrunner.labels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      containers:
        - name: redis
          image: "{{ .Values.redisStandalone.image.repository }}:{{ .Values.redisStandalone.image.tag }}"
          imagePullPolicy: {{ .Values.redisStandalone.image.pullPolicy }}
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.redisStandalone.resources | nindent 12 }}
          {{- if .Values.redisStandalone.storage.enabled }}
          volumeMounts:
            - name: redis-data
              mountPath: /data
          {{- end }}
      {{- if .Values.redisStandalone.storage.enabled }}
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: {{ include "speedrunner.fullname" . }}-redis
      {{- end }}
{{- end }}
