{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "speedrunner.fullname" . }}-monitoring
  labels:
    {{- include "speedrunner.labels" . | nindent 4 }}
    app.kubernetes.io/component: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'speedrunner-backend'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - {{ .Release.Namespace }}
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            action: keep
            regex: backend
          - source_labels: [__address__]
            action: replace
            target_label: __address__
            regex: (.+):(.+)
            replacement: ${1}:8080

  grafana-dashboard.json: |
    {
      "dashboard": {
        "title": "SpeedRunner Enterprise",
        "panels": [
          {
            "title": "Active Runs",
            "type": "stat",
            "targets": [{"expr": "speedrunner_active_runs"}]
          },
          {
            "title": "Active VUsers",
            "type": "stat",
            "targets": [{"expr": "speedrunner_active_v_users"}]
          },
          {
            "title": "API Requests/s",
            "type": "graph",
            "targets": [{"expr": "rate(speedrunner_api_requests_total[1m])"}]
          },
          {
            "title": "Run Duration",
            "type": "graph",
            "targets": [{"expr": "speedrunner_avg_run_duration"}]
          }
        ]
      }
    }
