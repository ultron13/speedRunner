{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "speedrunner.serviceAccountName" . }}-execution
  labels:
    {{- include "speedrunner.labels" . | nindent 4 }}
    app.kubernetes.io/component: execution
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "speedrunner.fullname" . }}-execution
  namespace: marathonrunner-execution
  labels:
    {{- include "speedrunner.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "speedrunner.fullname" . }}-execution
  namespace: marathonrunner-execution
  labels:
    {{- include "speedrunner.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "speedrunner.serviceAccountName" . }}-execution
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "speedrunner.fullname" . }}-execution
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "speedrunner.fullname" . }}-execution-viewer
  labels:
    {{- include "speedrunner.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["namespaces", "nodes", "persistentvolumes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "speedrunner.fullname" . }}-execution-viewer
  labels:
    {{- include "speedrunner.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "speedrunner.serviceAccountName" . }}-execution
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "speedrunner.fullname" . }}-execution-viewer
  apiGroup: rbac.authorization.k8s.io
{{- end }}
