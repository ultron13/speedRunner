apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "speedrunner.fullname" . }}-backend
  labels:
    {{- include "speedrunner.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "speedrunner.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "speedrunner.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: {{ include "speedrunner.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: backend
          image: {{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "speedrunner.fullname" . }}-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "speedrunner.fullname" . }}-secrets
                  key: redis-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "speedrunner.fullname" . }}-secrets
                  key: jwt-secret
            - name: K8S_IN_CLUSTER
              value: "true"
            - name: K8S_EXECUTION_NS
              value: marathonrunner-execution
            - name: K8S_SYSTEM_NS
              value: marathonrunner-system
            - name: ENGINE_MODE
              value: {{ .Values.backend.engine.mode | default "auto" | quote }}
            - name: JMETER_IMAGE
              value: {{ .Values.backend.engine.jmeterImage | default "speedrunner/jmeter:latest" }}
            - name: K6_IMAGE
              value: {{ .Values.backend.engine.k6Image | default "grafana/k6:latest" }}
            - name: ARTIFACT_DIR
              value: {{ .Values.backend.artifactDir | default "/tmp/speedrunner-artifacts" | quote }}
            - name: NODE_ENV
              value: {{ .Values.env.NODE_ENV | default "production" }}
            - name: LOG_LEVEL
              value: {{ .Values.env.LOG_LEVEL | default "info" }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
