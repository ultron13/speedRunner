{{- if .Values.redisStandalone.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "speedrunner.fullname" . }}-redis
  labels:
    {{- include "speedrunner.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.redis.port }}
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    {{- include "speedrunner.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
{{- end }}
