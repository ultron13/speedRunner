{{- if .Values.nginx.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "speedrunner.fullname" . }}-nginx
  labels:
    {{- include "speedrunner.labels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
data:
  nginx.conf: |
    worker_processes auto;

    events {
        worker_connections 1024;
    }

    http {
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        types_hash_max_size 2048;
        client_max_body_size 16M;

        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

        upstream speedrunner {
            server {{ include "speedrunner.fullname" . }}:{{ .Values.service.httpPort }};
            keepalive 32;
        }

        upstream websocket {
            server {{ include "speedrunner.fullname" . }}:{{ .Values.service.wsPort }};
            keepalive 32;
        }

        limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
        limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

        server {
            listen 80;
            server_name _;

            location /health {
                proxy_pass http://speedrunner;
                access_log off;
            }

            location / {
                proxy_pass http://speedrunner;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_cache_bypass $http_upgrade;
                proxy_read_timeout 90;
                proxy_connect_timeout 90;
            }

            location /ws {
                proxy_pass http://websocket;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_read_timeout 86400;
            }

            location /_next/static {
                proxy_pass http://speedrunner;
                proxy_cache_valid 200 365d;
                add_header Cache-Control "public, max-age=31536000, immutable";
            }

            location /api/ {
                limit_req zone=api burst=20 nodelay;
                proxy_pass http://speedrunner;
            }

            location /api/auth/login {
                limit_req zone=login burst=3 nodelay;
                proxy_pass http://speedrunner;
            }
        }
    }
{{- end }}
