# Development environment values
replicaCount: 1

autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

env:
  NODE_ENV: development
  LOG_LEVEL: debug
  LOG_FORMAT: pretty

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: speedrunner-dev.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

nginx:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

redisStandalone:
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
  storage:
    size: 512Mi

postgresStandalone:
  enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  storage:
    size: 1Gi
