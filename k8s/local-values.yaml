# Local development overrides (minikube)
replicaCount: 1

autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: false

# Next.js needs writable temp dirs; relax read-only FS for local cluster
securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# Probes against the Next standalone server on :8787
livenessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

startupProbe:
  httpGet:
    path: /api/health
    port: http
  failureThreshold: 30
  periodSeconds: 5
  timeoutSeconds: 5

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "86400"
  hosts:
    - host: speedrunner.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

image:
  repository: speedrunner-frontend
  tag: latest
  pullPolicy: IfNotPresent

env:
  NODE_ENV: production
  LOG_LEVEL: debug
  HOSTNAME: "0.0.0.0"
  K8S_IN_CLUSTER: "false"
  K8S_EXECUTION_NS: marathonrunner-execution
  K8S_SYSTEM_NS: marathonrunner-system
  # Browser still needs host-reachable API; use port-forwarded backend or ingress path.
  NEXT_PUBLIC_API_URL: ""

# Disable optional monitoring ConfigMap unless values define monitoring.enabled
monitoring:
  enabled: false

# Backend
backend:
  image:
    repository: speedrunner-backend
    tag: latest
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  engine:
    mode: auto
    jmeterImage: speedrunner/jmeter:latest
    k6Image: grafana/k6:latest
  artifactDir: /tmp/speedrunner-artifacts

# Redis
redis:
  enabled: true
  host: ""
  port: 6379
  password: ""

redisStandalone:
  enabled: true
  storage:
    enabled: true
    size: 1Gi

# PostgreSQL
postgres:
  enabled: true
  host: ""
  port: 5432
  database: speedrunner
  user: speedrunner
  password: speedrunner_secret

postgresStandalone:
  enabled: true
  storage:
    enabled: true
    size: 2Gi

# Nginx
nginx:
  enabled: false
  replicaCount: 1

# MinIO
minio:
  enabled: true
  rootUser: minioadmin
  rootPassword: minioadmin
